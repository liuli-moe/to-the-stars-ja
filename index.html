<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta name="giscus:backlink" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/dark.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
  "name": "魔法少女まどか☆マギカ ザ・スターズ",
  "repo": "https://github.com/liuli-moe/to-the-stars-ja.git",
  "loadSidebar": true,
  "auto2top": true,
  "pagination": {
    "previousText": "Previous",
    "nextText": "Next",
    "crossChapter": true,
    "crossChapterText": true
  }
}
      if (window.$docsify.giscus) {
        window.$docsify.giscus = {
          ...window.$docsify.giscus,
          mapping: 'specific',
          get term() {
            return location.hash.split('#')[1]
          },
          get backlink() {
            return location.href
          },
        }
      }
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  </body>
</html>
